<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>

  <!-- SEO friendly canonical -->
  <link rel="canonical" href="https://www.raibiraj.com.np/">

  <!-- Instant redirect -->
  <meta http-equiv="refresh" content="0; url=https://www.raibiraj.com.np/">

  <script>
    window.location.replace("https://www.raibiraj.com.np/");
  </script>
</head>
<body>
  <p>If you are not redirected automatically, go to
    <a href="https://www.raibiraj.com.np/">https://www.raibiraj.com.np/</a>
  </p>
</body>
</html>
