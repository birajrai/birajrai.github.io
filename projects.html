<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biraj Rai - Projects</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      .stars {
        display: inline-block;
        margin-left: 5px;
      }
    </style>
  </head>
  <body>
    <div class="nav">
      <div class="logo">
        <img src="assets/img/profile.png" alt="Site Logo" draggable="false" />
      </div>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a class="active" href="/projects.html">Projects</a></li>
        <li><a href="/contact.html">Contact</a></li>
      </ul>
    </div>
    <div class="title">
      <h1>My Projects</h1>
    </div>
    <div class="projects">
      <div class="lists">
        <ul class="one item">
          <h2>Java <span></span><img src="assets/img/profile.png" alt="" /></h2>
          <li>
            <a
              href="https://github.com/birajrai/decompiler"
              target="_blank"
              data-repo="birajrai/birajrai"
              >Java Decompiler<span
                class="stars"
                id="JavaDecompilerStars"
              ></span
            ></a>
          </li>

          <!-- Add other Java projects here -->
        </ul>
        <ul class="two item">
          <h2>
            NodeJS <span></span><img src="assets/img/profile.png" alt="" />
          </h2>

          <li>
            <a
              href="https://github.com/birajrai/Imagizer"
              target="_blank"
              data-repo="birajrai/Imagizer"
              >Imagizer<span class="stars" id="ImagizerStars"></span
            ></a>
          </li>
          <li>
            <a
              href="https://github.com/birajrai/short-url"
              target="_blank"
              data-repo="birajrai/short-url"
              >Short URL<span class="stars" id="ShortURLStars"></span
            ></a>
          </li>
          <!-- Add other NodeJS projects here -->
        </ul>
        <ul class="three item">
          <h2>
            Minecraft <span></span><img src="assets/img/profile.png" alt="" />
          </h2>

          <li>
            <a
              href="https://github.com/birajrai/Shiny"
              target="_blank"
              data-repo="birajrai/Shiny"
              >Shiny Client<span class="stars" id="ShinyStars"></span
            ></a>
          </li>
          <!-- Add other Minecraft projects here -->
        </ul>
      </div>
    </div>

    <script>
      function fetchGitHubStars(repo, elementId) {
        const apiUrl = `https://api.github.com/repos/${repo}`;

        fetch(apiUrl)
          .then((response) => response.json())
          .then((data) => {
            const starsElement = document.getElementById(elementId);
            if (data.stargazers_count !== undefined) {
              starsElement.textContent = `(${data.stargazers_count} stars)`;
            } else {
              starsElement.textContent = "(Stars count not available)";
            }
          })
          .catch((error) => {
            console.error("Error fetching GitHub stars:", error);
          });
      }

      // Fetch GitHub stars for each project
      fetchGitHubStars("birajrai/decompiler", "JavaDecompilerStars");
      fetchGitHubStars("birajrai/Imagizer", "ImagizerStars");
      fetchGitHubStars("birajrai/Short-url", "ShortURLStars");
      fetchGitHubStars("birajrai/Shiny", "ShinyStars");
      // Add similar lines for other projects
    </script>
  </body>
</html>
